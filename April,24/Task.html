<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Flat Calculator</title>
    <style>
        body {
            background-color: #1698c3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background-color: #2c3e50;
            width: 320px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 1.8rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 600;
        }

        /* Number Buttons */
        .btn-num {
            background-color: #bdc3c7;
            color: #2c3e50;
        }
        .btn-num:hover { background-color: #aeb6bc; }

        /* Operator Buttons */
        .btn-op {
            background-color: #e67e22;
            color: white;
        }
        .btn-op:hover { background-color: #d35400; }

        /* Clear Button */
        .clear {
            background-color: #c0392b;
            color: white;
            width: 100%;
            margin-top: 15px;
            height: 40px;
        }
        .clear:hover { background-color: #a93226; }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div id="display">0</div>
        
        <div class="buttons">
            <button class="btn-num" onclick="append('7')">7</button>
            <button class="btn-num" onclick="append('8')">8</button>
            <button class="btn-num" onclick="append('9')">9</button>
            <button class="btn-op" onclick="append('*')">×</button>
            
            <button class="btn-num" onclick="append('4')">4</button>
            <button class="btn-num" onclick="append('5')">5</button>
            <button class="btn-num" onclick="append('6')">6</button>
            <button class="btn-op" onclick="append('/')">÷</button>
            
            <button class="btn-num" onclick="append('1')">1</button>
            <button class="btn-num" onclick="append('2')">2</button>
            <button class="btn-num" onclick="append('3')">3</button>
            <button class="btn-op" onclick="append('-')">−</button>
            
            <button class="btn-num" onclick="append('0')">0</button>
            <button class="btn-num" onclick="append('.')">.</button>
            <button class="btn-op" onclick="calculate()">=</button>
            <button class="btn-op" onclick="append('+')">+</button>
        </div>
        
        <button class="clear" onclick="clearDisplay()">CLEAR</button>
    </div>

    <script>
        let displayElement = document.getElementById('display');
        let currentInput = '';

        function append(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }

        function calculate() {
            try {
                // Using eval safely for this specific use case
                let result = eval(currentInput);
                currentInput = result.toString();
            } catch (error) {
                currentInput = "Error";
            }
            updateDisplay();
        }

        function updateDisplay() {
            displayElement.innerText = currentInput || '0';
        }
    </script>
</body>
</html>
