<!DOCTYPE html>
<html>
<head>
  <title>Simple Slider</title>

  <style>
    body {
      text-align: center;
      background: lightgray;
      font-family: Arial;
    }

    .box {
      background: white;
      width: 400px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }

    button {
      padding: 8px 15px;
      margin: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Slider</h2>

  <img id="image" src="https://th.bing.com/th/id/OIP.IGyEjou4PlKJPwElg9AKLgHaE8?w=307&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">

  <br>

  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>

  <p id="text">Image 1</p>
</div>

<script>
  let images = [
    "https://th.bing.com/th/id/OIP.zB1rsS80G2GPbY0mMvKnigHaEK?w=316&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
    "https://th.bing.com/th/id/OIP.VqFvHSAcDq7Q3nlvGAbAKQHaEJ?w=291&h=181&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3",
    "https://th.bing.com/th/id/OIP.N_hkob4HqPwxqawEjhcvXQHaDt?w=326&h=175&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
  ];

  let i = 0;

  function next() {
    i++;
    if (i >= images.length) {
      i = 0;
    }
    document.getElementById("image").src = images[i];
    document.getElementById("text").innerText = "Image " + (i + 1);
  }

  function prev() {
    i--;
    if (i < 0) {
      i = images.length - 1;
    }
    document.getElementById("image").src = images[i];
    document.getElementById("text").innerText = "Image " + (i + 1);
  }
</script>

</body>
</html>
