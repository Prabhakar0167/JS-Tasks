<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time-Based Greeting UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
      color: #fff;
      transition: background 1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,.06), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(255,255,255,.04), transparent 50%);
      pointer-events: none;
    }

    body.morning   { background: linear-gradient(135deg, #ff9a56 0%, #ffcd69 30%, #87ceeb 70%, #5fa8d3 100%); }
    body.afternoon { background: linear-gradient(135deg, #48c6ef 0%, #6f86d6 40%, #43cea2 100%); }
    body.evening   { background: linear-gradient(135deg, #e040fb 0%, #7c4dff 30%, #304ffe 60%, #1a237e 100%); }
    body.night     { background: linear-gradient(135deg, #0d0d2b 0%, #1a1a4e 40%, #0f0c29 70%, #000 100%); }

    body.light-mode.morning   { background: linear-gradient(135deg, #ffecd2, #fcb69f 50%, #ff9a9e); }
    body.light-mode.afternoon { background: linear-gradient(135deg, #a8edea, #fed6e3 50%, #d299c2); }
    body.light-mode.evening   { background: linear-gradient(135deg, #e8cbc0, #636fa4 50%, #3f4c6b); }
    body.light-mode.night     { background: linear-gradient(135deg, #2c3e50, #4ca1af 50%, #2c3e50); }

    .header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 20px rgba(0,0,0,.3);
    }

    .header p {
      font-size: .95rem;
      opacity: .8;
      margin-top: 6px;
      text-shadow: 0 1px 10px rgba(0,0,0,.2);
    }

    .glass {
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.1);
      transition: box-shadow .3s ease;
      position: relative;
      z-index: 1;
    }

    .glass:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15);
    }

    body.light-mode .glass {
      background: rgba(255,255,255,.55);
      border-color: rgba(255,255,255,.6);
      color: #1e293b;
    }

    .panel-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: .5;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .greeting-display {
      text-align: center;
      margin: 24px 0;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .greeting-emoji {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.2));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .greeting-text {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 12px;
      text-shadow: 0 2px 15px rgba(0,0,0,.2);
    }

    .greeting-sub {
      font-size: .9rem;
      opacity: .7;
      margin-top: 6px;
    }

    .fade-enter {
      animation: fadeSlideIn .5s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .time-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 14px 22px;
      text-align: center;
      min-width: 90px;
      transition: all .3s ease;
    }

    .time-box:hover {
      background: rgba(255,255,255,.18);
      transform: translateY(-2px);
    }

    body.light-mode .time-box {
      background: rgba(0,0,0,.05);
      border-color: rgba(0,0,0,.1);
    }

    .time-value {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .time-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: .6;
      margin-top: 6px;
    }

    .time-separator {
      font-size: 2rem;
      font-weight: 700;
      opacity: .4;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .slider-section { margin: 28px 0; }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .slider-title {
      font-size: .85rem;
      font-weight: 600;
      opacity: .8;
    }

    .slider-value {
      font-size: 1rem;
      font-weight: 700;
      background: rgba(255,255,255,.12);
      padding: 4px 14px;
      border-radius: 8px;
      font-variant-numeric: tabular-nums;
    }

    .hour-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,.15);
      outline: none;
      cursor: pointer;
    }

    body.light-mode .hour-slider { background: rgba(0,0,0,.1); }

    .hour-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 10px rgba(0,0,0,.3), 0 0 0 3px rgba(255,255,255,.3);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }

    .hour-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 4px 16px rgba(0,0,0,.3), 0 0 0 5px rgba(255,255,255,.2);
    }

    .hour-slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 10px rgba(0,0,0,.3);
      cursor: pointer;
      border: none;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: .7rem;
      opacity: .4;
      font-weight: 600;
    }

    .progress-section { margin: 24px 0; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-title {
      font-size: .85rem;
      font-weight: 600;
      opacity: .8;
    }

    .progress-percent {
      font-size: .85rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,.1);
      border-radius: 6px;
      overflow: hidden;
    }

    body.light-mode .progress-track { background: rgba(0,0,0,.08); }

    .progress-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #fbbf24, #f97316, #ef4444, #a855f7);
      transition: width .6s cubic-bezier(.4,0,.2,1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 20px;
      height: 100%;
      background: rgba(255,255,255,.3);
      border-radius: 6px;
      animation: glow 1.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: .3; }
      50% { opacity: .8; }
    }

    .progress-markers {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: .65rem;
      opacity: .4;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
      font-family: Arial, sans-serif;
      transition: all .3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .btn:active { transform: scale(.96); }

    .btn-system, .btn-theme {
      background: rgba(255,255,255,.15);
      color: white;
      border: 1px solid rgba(255,255,255,.2);
    }

    .btn-system:hover, .btn-theme:hover {
      background: rgba(255,255,255,.25);
      transform: translateY(-2px);
    }

    body.light-mode .btn-system,
    body.light-mode .btn-theme {
      background: rgba(0,0,0,.08);
      color: #1e293b;
      border-color: rgba(0,0,0,.15);
    }

    body.light-mode .btn-system:hover,
    body.light-mode .btn-theme:hover {
      background: rgba(0,0,0,.12);
    }

    @media (max-width: 500px) {
      body { padding: 15px 10px; }
      .glass { padding: 20px 16px; border-radius: 16px; }
      .header h1 { font-size: 1.5rem; }
      .greeting-text { font-size: 1.5rem; }
      .greeting-emoji { font-size: 3rem; }
      .time-display { gap: 8px; }
      .time-box { padding: 10px 14px; min-width: 70px; }
      .time-value { font-size: 1.6rem; }
      .btn { padding: 10px 14px; font-size: .8rem; }
    }
  </style>
</head>
<body class="morning">

  <div class="header">
    <h1>⏰ Time-Based Greeting UI</h1>
    <p>Select an hour and see the greeting change dynamically</p>
  </div>

  <div class="glass">
    <div class="panel-label">⚡ Interactive Preview</div>

    <div class="greeting-display">
      <div class="greeting-emoji" id="greetingEmoji">☀️</div>
      <div class="greeting-text fade-enter" id="greetingText">Good Morning</div>
      <div class="greeting-sub" id="greetingSub">The day is full of possibilities</div>
    </div>

    <div class="time-display">
      <div class="time-box">
        <div class="time-value" id="hourDisplay">08</div>
        <div class="time-label">Hour</div>
      </div>
      <div class="time-separator">:</div>
      <div class="time-box">
        <div class="time-value" id="minDisplay">00</div>
        <div class="time-label">Min</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="periodDisplay">AM</div>
        <div class="time-label">Period</div>
      </div>
    </div>

    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-title">🕐 Select Hour</span>
        <span class="slider-value" id="sliderValue">8</span>
      </div>
      <input type="range" class="hour-slider" id="hourSlider" min="0" max="23" value="8" />
      <div class="slider-labels">
        <span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11 PM</span>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">📊 Day Progress</span>
        <span class="progress-percent" id="progressPercent">33%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:33%"></div>
      </div>
      <div class="progress-markers">
        <span>🌙 12AM</span><span>☀️ 6AM</span><span>🌤️ 12PM</span><span>🌅 6PM</span><span>🌌 12AM</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-system" id="systemTimeBtn">🖥️ Use System Time</button>
      <button class="btn btn-theme" id="themeBtn">🌙 Dark Mode</button>
    </div>
  </div>

  <script>
    const hourSlider      = document.getElementById("hourSlider");
    const sliderValue     = document.getElementById("sliderValue");
    const hourDisplay     = document.getElementById("hourDisplay");
    const minDisplay      = document.getElementById("minDisplay");
    const periodDisplay   = document.getElementById("periodDisplay");
    const greetingEmoji   = document.getElementById("greetingEmoji");
    const greetingText    = document.getElementById("greetingText");
    const greetingSub     = document.getElementById("greetingSub");
    const progressFill    = document.getElementById("progressFill");
    const progressPercent = document.getElementById("progressPercent");
    const systemTimeBtn   = document.getElementById("systemTimeBtn");
    const themeBtn        = document.getElementById("themeBtn");

    let isDark = true;

    function getGreeting(hour) {
      if (hour >= 5  && hour <= 11) return { text:"Good Morning",   emoji:"☀️",  sub:"The day is full of possibilities", period:"morning"   };
      if (hour >= 12 && hour <= 17) return { text:"Good Afternoon",  emoji:"🌤️", sub:"Keep up the great momentum",      period:"afternoon" };
      if (hour >= 18 && hour <= 23) return { text:"Good Evening",    emoji:"🌙",  sub:"Time to relax and unwind",        period:"evening"   };
      return                          { text:"Good Night",       emoji:"🌌", sub:"Rest well, tomorrow awaits",       period:"night"     };
    }

    function updateUI(hour) {
      const g = getGreeting(hour);

      const h12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
      hourDisplay.textContent   = String(h12).padStart(2, "0");
      periodDisplay.textContent = hour >= 12 ? "PM" : "AM";
      sliderValue.textContent   = hour;

      greetingEmoji.textContent = g.emoji;
      greetingText.textContent  = g.text;
      greetingSub.textContent   = g.sub;

      greetingText.classList.remove("fade-enter");
      void greetingText.offsetWidth;
      greetingText.classList.add("fade-enter");

      const pct = Math.round((hour / 24) * 100);
      progressFill.style.width = pct + "%";
      progressPercent.textContent = pct + "%";

      document.body.classList.remove("morning","afternoon","evening","night");
      document.body.classList.add(g.period);
    }

    hourSlider.addEventListener("input", () => updateUI(parseInt(hourSlider.value)));

    systemTimeBtn.addEventListener("click", () => {
      const h = new Date().getHours();
      hourSlider.value = h;
      updateUI(h);
    });

    themeBtn.addEventListener("click", () => {
      isDark = !isDark;
      document.body.classList.toggle("light-mode", !isDark);
      themeBtn.textContent = isDark ? "🌙 Dark Mode" : "☀️ Light Mode";
    });

    updateUI(8);
  </script>
</body>
</html>
