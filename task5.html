 <!-- Contact Form -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            color: #333;
            padding: 60px 20px;
        }
        .contact-section {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 60px;
        }
        /* Left side */
        .contact-info {
            flex: 0 0 220px;
            border-right: 1px solid #e5e5e5;
            padding-right: 40px;
        }
        .contact-info h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .contact-info p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        /* Right side form */
        .contact-form {
            flex: 1;
        }
        .form-row {
            display: flex;
            gap: 30px;
            margin-bottom: 35px;
        }
        .form-group {
            flex: 1;
            position: relative;
        }
        .form-group.full {
            flex: 1 1 100%;
        }
        input, select, textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 0.9rem;
            background: transparent;
            padding: 8px 0;
        }
        select{
            cursor: pointer;
            color: #999;
        }
         select:valid { color: #333; }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 25px 0;
      font-size: 0.85rem;
      color: #444;
    }
    .checkbox-group input {
      width: auto;
      margin-top: 3px;
    }
    .checkbox-group a {
      color: #d00;
      text-decoration: none;
    }
    .required-note {
      color: #d00;
    }
    /* reCAPTCHA placeholder */
    .recaptcha-box {
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      background: #f9f9f9;
      width: 300px;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
    }
    .recaptcha-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .recaptcha-left input {
      width: 24px;
      height: 24px;
    }
    .recaptcha-logo {
      font-size: 0.7rem;
      text-align: right;
      color: #555;
    }
    /* Submit */
    .submit-btn {
      background: #d00;
      color: #fff;
      border: none;
      padding: 12px 30px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
     .submit-btn:hover {
      background: #b00000;
     }        

    </style>
</head>
<body>
    <div class="contact-section">
        <div class = "contact-info">
            <h1>Contact Us</h1>
            <p>Let us know how we can help.</p>
        </div>
        <!-- Right Form -->
         <div class="contact-form">
            <form class="contact-form" onsubmit="return validateForm(event)">
                <div class="form-row">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Your Email Address" required>
                </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <select id="inquiry" required>
                            <option value="" disabled selected>Type of Inquiry</option>
                            <option value="Technical">Technical</option>
                            <option value="media">Media</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <input type="text" id="company" placeholder="Company">
                    </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full">
                            <select id="country" required>
                                <option value="" disabled>Country</option>
                                <option value="India" selected>India</option>
                                <option value="USA">USA</option>
                                <option value="UK">UK</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full">
                            <textarea id="message" placeholder="Your Message"></textarea>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="consent" required>
                        <label for="consent"> By submitting this form, I understand that my data will be processed by WNS (Holdings) Ltd. as indicated above and described in the <a href="#">Privacy Policy</a>. <span class="required-note">*This is a required field.</span></label>
                </div>
                <!-- reCAPTCHA placeholder -->
      <div class="recaptcha-box">
        <div class="recaptcha-left">
          <input type="checkbox" id="notRobot" required>
          <label for="notRobot">I'm not a robot</label>
        </div>
        <div class="recaptcha-logo">reCAPTCHA</div>
      </div>

      <button type="submit" class="submit-btn">SUBMIT</button>
            </form>
                </div>

                <script>
                    function validateForm(event) {
                        event.preventDefault(); // Prevent form submission

                        // Get form values
                        const name = document.getElementById('name').value.trim();
                        const email = document.getElementById('email').value.trim();
                        const inquiry = document.getElementById('inquiry').value;
                        const company = document.getElementById('company').value.trim();
                        const country = document.getElementById('country').value;
                        const message = document.getElementById('message').value.trim();
                        const consent = document.getElementById('consent').checked;
                        const notRobot = document.getElementById('notRobot').checked;

                        // Basic validation
                        if (!name || !email || !inquiry || !country || !consent || !notRobot) {
                            alert('Please fill in all required fields and agree to the terms.');
                            return false;
                        }

                        // Email format validation
                        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (!emailPattern.test(email)) {
                            alert('Please enter a valid email address.');
                            return false;
                        }

                        // If all validations pass, you can submit the form or perform further actions here
                        alert('Form submitted successfully!');
                        return true; // Return true to allow form submission
                    }



                </script>
    
</body>
</html>
