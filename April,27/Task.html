<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Container Color + Progress</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-image: url("https://th.bing.com/th/id/OIP.E-XYQ85lMBTCcNO0XHDNhgHaEG?w=263&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .outer-container {
    width: 100%;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }

  .inner-row {
    display: flex;
    gap: 30px;
    min-height: 0;
  }

  .inner-container {
    flex: 1;
    padding: 20px;
    border-radius: 16px;
    background: #fffee8;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 500px;
  }

  #container2 {
    background: #e8fff0;
  }

  h3 {
    font-size: 28px;
    margin-bottom: 30px;
  }

  /* Progress Bar */
  .progress {
    width: 100%;
    height: 20px;
    background: #ddd;
    border-radius: 15px;
    margin: 25px 0;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #3498db;
    border-radius: 15px;
    transition: 0.5s;
  }

  /* Buttons */
  .button-row {
    display: flex;
    gap: 15px;
    margin-top: 20px;
  }

  button {
    flex: 1;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
  }

  .blue { background: #3498db; }
  .green { background: #27ae60; }
  .red { background: #e74c3c; }
  .gray { background: #7f8c8d; }

  button:hover {
    opacity: 0.9;
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .inner-row {
      flex-direction: column;
    }

    h3 {
      font-size: 22px;
    }

    button {
      font-size: 16px;
      padding: 12px;
    }
  }
</style>
</head>

<body>

<div class="outer-container">

  <div class="inner-row">

    <!-- Container 1 -->
    <div class="inner-container" id="container1">
      <h3>Container 1</h3>

      <div class="progress">
        <div class="progress-fill" id="progress1"></div>
      </div>

      <div class="button-row">
        <button class="blue" onclick="setProgress(1,10)">10%</button>
        <button class="green" onclick="setProgress(1,50)">50%</button>
        <button class="red" onclick="setProgress(1,100)">100%</button>
      </div>

      <div class="button-row">
        <button class="blue" onclick="changeColor('container1','#3498db')">Blue</button>
        <button class="green" onclick="changeColor('container1','#2ecc71')">Green</button>
        <button class="red" onclick="changeColor('container1','#e74c3c')">Red</button>
        <button class="gray" onclick="resetAll(1)">Reset</button>
      </div>
    </div>

    <!-- Container 2 -->
    <div class="inner-container" id="container2">
      <h3>Container 2</h3>

      <div class="progress">
        <div class="progress-fill" id="progress2"></div>
      </div>

      <div class="button-row">
        <button class="blue" onclick="setProgress(2,10)">10%</button>
        <button class="green" onclick="setProgress(2,50)">50%</button>
        <button class="red" onclick="setProgress(2,100)">100%</button>
      </div>

      <div class="button-row">
        <button class="blue" onclick="changeColor('container2','#3498db')">Blue</button>
        <button class="green" onclick="changeColor('container2','#2ecc71')">Green</button>
        <button class="red" onclick="changeColor('container2','#e74c3c')">Red</button>
        <button class="gray" onclick="resetAll(2)">Reset</button>
      </div>
    </div>

  </div>
</div>

<script>
  const defaults = {
    1: { bg: '#e8f0ff' },
    2: { bg: '#e8fff0' }
  };

  function changeColor(id, color) {
    document.getElementById(id).style.background = color;
  }

  function setProgress(id, value) {
    document.getElementById(`progress${id}`).style.width = value + "%";
  }

  function resetAll(id) {
    document.getElementById(`container${id}`).style.background = defaults[id].bg;
    document.getElementById(`progress${id}`).style.width = "0%";
  }
</script>

</body>
</html>
